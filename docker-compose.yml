services:
  mysql:
    image: mysql:8.4
    container_name: activity-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-activity_registration}
      MYSQL_USER: ${MYSQL_USER:-activity}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-activitypass}
    ports:
      - "${MYSQL_HOST_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: activity-api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      APP_VERSION: ${APP_VERSION:-0.1.0}
      BUILD_COMMIT: ${BUILD_COMMIT:-local}
      BUILD_TIME: ${BUILD_TIME:-unknown}
      API_PORT: ${API_PORT:-3000}
      INSTALLER_ENABLED: ${INSTALLER_ENABLED:-false}
      DB_HOST: ${DB_HOST:-mysql}
      DB_PORT: ${DB_PORT:-3306}
      DB_USERNAME: ${DB_USERNAME:-activity}
      DB_PASSWORD: ${DB_PASSWORD:-activitypass}
      DB_DATABASE: ${DB_DATABASE:-activity_registration}
      DB_SYNCHRONIZE: ${DB_SYNCHRONIZE:-false}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080,http://localhost:5173}
      TRUST_PROXY: ${TRUST_PROXY:-true}
      SECURITY_HEADERS_ENABLED: ${SECURITY_HEADERS_ENABLED:-true}
      SECURITY_HSTS_ENABLED: ${SECURITY_HSTS_ENABLED:-true}
      VALIDATION_FORBID_NON_WHITELISTED: ${VALIDATION_FORBID_NON_WHITELISTED:-true}
      ACCESS_LOG_ENABLED: ${ACCESS_LOG_ENABLED:-true}
      ACCESS_LOG_SKIP_HEALTH: ${ACCESS_LOG_SKIP_HEALTH:-true}
      PUBLIC_H5_ORIGIN: ${PUBLIC_H5_ORIGIN:-http://localhost:8080}
      PUBLIC_ADMIN_ORIGIN: ${PUBLIC_ADMIN_ORIGIN:-http://localhost:8080/admin}
      PUBLIC_API_ORIGIN: ${PUBLIC_API_ORIGIN:-http://localhost:8080}
      UPLOAD_DIR: ${UPLOAD_DIR:-uploads}
      H5_AUTH_MODE: ${H5_AUTH_MODE:-sms}
      H5_AUTH_SECRET: ${H5_AUTH_SECRET:-change-me-h5-auth-secret}
      H5_CODE_EXPIRE_MINUTES: ${H5_CODE_EXPIRE_MINUTES:-10}
      H5_CODE_COOLDOWN_SECONDS: ${H5_CODE_COOLDOWN_SECONDS:-60}
      H5_CODE_PHONE_HOURLY_LIMIT: ${H5_CODE_PHONE_HOURLY_LIMIT:-6}
      H5_CODE_PHONE_DAILY_LIMIT: ${H5_CODE_PHONE_DAILY_LIMIT:-20}
      H5_CODE_IP_HOURLY_LIMIT: ${H5_CODE_IP_HOURLY_LIMIT:-60}
      H5_DEV_VERIFICATION_CODE: ${H5_DEV_VERIFICATION_CODE:-123456}
      ADMIN_LOGIN_WINDOW_MINUTES: ${ADMIN_LOGIN_WINDOW_MINUTES:-10}
      ADMIN_LOGIN_MAX_FAILURES: ${ADMIN_LOGIN_MAX_FAILURES:-5}
      ADMIN_LOGIN_LOCK_MINUTES: ${ADMIN_LOGIN_LOCK_MINUTES:-10}
      PAYMENT_SANDBOX_ENABLED: ${PAYMENT_SANDBOX_ENABLED:-false}
      PAYMENT_SANDBOX_SECRET: ${PAYMENT_SANDBOX_SECRET:-change-me-payment-sandbox-secret}
      WECHAT_PAY_SANDBOX_SECRET: ${WECHAT_PAY_SANDBOX_SECRET:-change-me-wechat-sandbox-secret}
      ALIPAY_PAY_SANDBOX_SECRET: ${ALIPAY_PAY_SANDBOX_SECRET:-change-me-alipay-sandbox-secret}
      REAL_PAYMENT_ENABLED: ${REAL_PAYMENT_ENABLED:-false}
      REAL_PAYMENT_SDK_IMPLEMENTED: ${REAL_PAYMENT_SDK_IMPLEMENTED:-false}
      REAL_PAYMENT_CALLBACK_VERIFICATION_IMPLEMENTED: ${REAL_PAYMENT_CALLBACK_VERIFICATION_IMPLEMENTED:-false}
      REAL_REFUND_QUERY_IMPLEMENTED: ${REAL_REFUND_QUERY_IMPLEMENTED:-false}
      REAL_PAYMENT_STATEMENT_FETCH_IMPLEMENTED: ${REAL_PAYMENT_STATEMENT_FETCH_IMPLEMENTED:-false}
      AGENT_REAL_TRANSFER_IMPLEMENTED: ${AGENT_REAL_TRANSFER_IMPLEMENTED:-false}
      MALL_REAL_WECHAT_PAYMENT_IMPLEMENTED: ${MALL_REAL_WECHAT_PAYMENT_IMPLEMENTED:-false}
      MALL_MERCHANT_DIRECT_PAYMENT_IMPLEMENTED: ${MALL_MERCHANT_DIRECT_PAYMENT_IMPLEMENTED:-false}
      REAL_PAYMENT_PREFLIGHT_PASSED: ${REAL_PAYMENT_PREFLIGHT_PASSED:-false}
      REAL_PAYMENT_PREFLIGHT_RESULT_FILE: ${REAL_PAYMENT_PREFLIGHT_RESULT_FILE:-deploy/real-payment-smoke-result.json}
      REAL_PAYMENT_PREFLIGHT_MAX_AGE_HOURS: ${REAL_PAYMENT_PREFLIGHT_MAX_AGE_HOURS:-168}
      MULTI_TENANT_ENABLED: ${MULTI_TENANT_ENABLED:-false}
      MULTI_TENANT_SCHEMA_IMPLEMENTED: ${MULTI_TENANT_SCHEMA_IMPLEMENTED:-false}
      MULTI_TENANT_ACCESS_FILTER_IMPLEMENTED: ${MULTI_TENANT_ACCESS_FILTER_IMPLEMENTED:-false}
      MULTI_TENANT_PUBLIC_BOUNDARY_IMPLEMENTED: ${MULTI_TENANT_PUBLIC_BOUNDARY_IMPLEMENTED:-false}
      MULTI_TENANT_PREFLIGHT_PASSED: ${MULTI_TENANT_PREFLIGHT_PASSED:-false}
      MULTI_TENANT_PREFLIGHT_RESULT_FILE: ${MULTI_TENANT_PREFLIGHT_RESULT_FILE:-deploy/tenant-smoke-result.json}
      MULTI_TENANT_PREFLIGHT_MAX_AGE_HOURS: ${MULTI_TENANT_PREFLIGHT_MAX_AGE_HOURS:-168}
      MALL_MULTI_MERCHANT_ENABLED: ${MALL_MULTI_MERCHANT_ENABLED:-false}
      MALL_MULTI_MERCHANT_PREFLIGHT_PASSED: ${MALL_MULTI_MERCHANT_PREFLIGHT_PASSED:-false}
      MALL_MULTI_MERCHANT_SMOKE_RESULT_FILE: ${MALL_MULTI_MERCHANT_SMOKE_RESULT_FILE:-deploy/mall-multi-merchant-smoke-result.json}
      MALL_MULTI_MERCHANT_SMOKE_MAX_AGE_HOURS: ${MALL_MULTI_MERCHANT_SMOKE_MAX_AGE_HOURS:-168}
      WECHAT_PAY_ENABLED: ${WECHAT_PAY_ENABLED:-false}
      WECHAT_PAY_APP_ID: ${WECHAT_PAY_APP_ID:-}
      WECHAT_PAY_MCH_ID: ${WECHAT_PAY_MCH_ID:-}
      WECHAT_PAY_API_V3_KEY: ${WECHAT_PAY_API_V3_KEY:-}
      WECHAT_PAY_PRIVATE_KEY_PATH: ${WECHAT_PAY_PRIVATE_KEY_PATH:-}
      WECHAT_PAY_CERT_SERIAL_NO: ${WECHAT_PAY_CERT_SERIAL_NO:-}
      WECHAT_PAY_PLATFORM_CERT_PATH: ${WECHAT_PAY_PLATFORM_CERT_PATH:-}
      WECHAT_PAY_NOTIFY_URL: ${WECHAT_PAY_NOTIFY_URL:-}
      WECHAT_TRANSFER_APP_ID: ${WECHAT_TRANSFER_APP_ID:-}
      WECHAT_TRANSFER_SCENE_ID: ${WECHAT_TRANSFER_SCENE_ID:-}
      WECHAT_TRANSFER_REMARK: ${WECHAT_TRANSFER_REMARK:-Agent settlement payout}
      ALIPAY_ENABLED: ${ALIPAY_ENABLED:-false}
      ALIPAY_APP_ID: ${ALIPAY_APP_ID:-}
      ALIPAY_PRIVATE_KEY_PATH: ${ALIPAY_PRIVATE_KEY_PATH:-}
      ALIPAY_PUBLIC_CERT_PATH: ${ALIPAY_PUBLIC_CERT_PATH:-}
      ALIPAY_ROOT_CERT_PATH: ${ALIPAY_ROOT_CERT_PATH:-}
      ALIPAY_NOTIFY_URL: ${ALIPAY_NOTIFY_URL:-}
      SMS_PROVIDER_ENABLED: ${SMS_PROVIDER_ENABLED:-false}
      SMS_PROVIDER: ${SMS_PROVIDER:-tencent-cloud-sms}
      SMS_ACCESS_KEY_ID: ${SMS_ACCESS_KEY_ID:-}
      SMS_ACCESS_KEY_SECRET: ${SMS_ACCESS_KEY_SECRET:-}
      SMS_SIGN_NAME: ${SMS_SIGN_NAME:-}
      SMS_TEMPLATE_ID: ${SMS_TEMPLATE_ID:-}
      EMAIL_PROVIDER_ENABLED: ${EMAIL_PROVIDER_ENABLED:-false}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-smtp}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      WECHAT_MESSAGE_PROVIDER_ENABLED: ${WECHAT_MESSAGE_PROVIDER_ENABLED:-false}
      WECHAT_MESSAGE_PROVIDER: ${WECHAT_MESSAGE_PROVIDER:-wechat-subscribe-message}
      WECHAT_LOGIN_REAL_ENABLED: ${WECHAT_LOGIN_REAL_ENABLED:-true}
      WECHAT_APP_ID: ${WECHAT_APP_ID:-}
      WECHAT_APP_SECRET: ${WECHAT_APP_SECRET:-}
      NOTIFICATION_FORCE_FAIL: ${NOTIFICATION_FORCE_FAIL:-false}
      NOTIFICATION_SCHEDULE_WORKER_ENABLED: ${NOTIFICATION_SCHEDULE_WORKER_ENABLED:-false}
      NOTIFICATION_SCHEDULE_WORKER_INTERVAL_SECONDS: ${NOTIFICATION_SCHEDULE_WORKER_INTERVAL_SECONDS:-300}
      OFFLINE_PAYMENT_EXPIRE_MINUTES: ${OFFLINE_PAYMENT_EXPIRE_MINUTES:-1440}
      ORDER_CLOSE_WORKER_ENABLED: ${ORDER_CLOSE_WORKER_ENABLED:-false}
      ORDER_CLOSE_WORKER_INTERVAL_SECONDS: ${ORDER_CLOSE_WORKER_INTERVAL_SECONDS:-300}
    ports:
      - "${API_HOST_PORT:-3000}:3000"
    volumes:
      - uploads-data:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/api/health/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10

  nginx:
    image: nginx:1.27-alpine
    container_name: activity-nginx
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_HOST_PORT:-8080}:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./apps/admin/dist:/usr/share/nginx/admin:ro
      - ./apps/mobile/dist/build/h5:/usr/share/nginx/h5:ro
      - uploads-data:/usr/share/nginx/uploads:ro

volumes:
  mysql-data:
  uploads-data:
